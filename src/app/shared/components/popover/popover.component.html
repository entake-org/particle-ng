<div class="particle_popover_overlay"
     [style.display]="render ? '' : 'none'"
     [attr.aria-hidden]="!render"
     [style.scale]="window.innerWidth > 768 ? 1 : scaleForMobile()"
>
  <div class="particle_popover"
       [class.open]="isOpen()"
       [cdkTrapFocus]="render && visible"
       [cdkTrapFocusAutoCapture]="true"
       [ngStyle]="{'width': width, 'height': height}"
       [ngClass]="classList()"
       #container
  >
    <ng-content></ng-content>
  </div>
</div>
