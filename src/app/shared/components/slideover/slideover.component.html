<div #overlay
     (click)="modal() ? close() : null"
     aria-hidden="true"
     class="particle_dialog_overlay"
     [class.cursor_pointer]="modal()"
     [class.overlay_active]="modal() && slideoverOpen">
</div>

<div
  role="dialog"
  aria-labelledby="slideover-title"
  [class.transitions_enabled]="isInitialized"
  [attr.aria-modal]="modal()"
  [cdkTrapFocus]="modal() && slideoverOpen"
  [cdkTrapFocusAutoCapture]="modal()"
  [ngClass]="bgClass() + ' ' + (slideoverOpen ? 'slideover_active_' + position() : 'slideover_inactive_' + position()) + ' slideover-panel ' + position()"
  [style.width]="position() === 'right' || position() === 'left' ? (breakpointExceeded ? '100%' : width()) : null"
  [style.height]="position() === 'top' || position() === 'bottom' ? (breakpointExceeded ? '100%' : height()) : null"
  [attr.inert]="!slideoverOpen ? '' : null"
>
  <span id="slideover-title" style="display: none;">{{ text().title || 'Slideover' }}</span>

  @if (!hideCloseButton()) {
    <div class="push_close_bar">
      <button class="access btnset clear"
              [attr.aria-label]="text().close"
              (click)="close()">
        <div class="circle_20px ptl_brdr_color ptl_brdr_size ptl_input_bg_color">
          <i class="fas fa-times"></i>
        </div>
      </button>
    </div>
  }
  <ng-content></ng-content>
</div>
